<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>inserindo dados</title>
</head>

<style>
    body {
        height: 90vh;
        {#border: 1px solid black;#} display: grid;
        justify-content: center;
        align-content: center;
        margin: 20px;
        padding: 20px;
    }

    section {
        font-size: 32px;
        flex: 1;
        {#border: 1px solid black;#} text-align: end;
    }

    input {
        font-size: 20px;
        height: 30px;
        width: 500px;
        border-radius: 5px;
        border: 1px solid gray;
        padding-left: 10px;
    }

    select {
        font-size: 20px;
        height: 35px;
        width: 515px;
        border-radius: 5px;
        border: 1px solid gray;
        padding-left: 10px;
    }

    .entrada::before{
        content: " *";
    }

    form {
     {#border: 1px solid gray;#} text-align: center;
    }

    button {
        font-size: 32px;
        border-radius: 5px;
        border: 1px solid gray;
        margin: 20px;
        cursor: pointer;
    }

    button:hover {
        background-color: white;
    }

</style>

<body>
<form action="/registrar" method='POST'>
    <section>
        <label for="name">Nome:
            <input class="entrada" type="text" name='nome' required><br>
        </label>

        <label for="tipo">Tipo:
            <input type="text" name='tipo' required><br>
        </label>

        <label for="familia">Família:
        <select name="familia_id" required>

        <option value="">
            Selecione uma família
        </option>

        {% for familia in familias %}

            <option value="{{ familia.id }}">
                {{ familia.nome }}
            </option>

        {% endfor %}

        </select><br>
        </label>

        <label for="habitat">Habitat:
            <input type="text" name='habitat' required><br>
        </label>

        <label for="descricao">Descricao:
            <input type="text" name='descricao' required><br>
        </label>

        <label for="imagem">Imagem:
            <input type="text" name='imagem' required><br>
        </label>

    </section>
    <button type="submit">Enviar</button>
</form>
</body>
</html>
