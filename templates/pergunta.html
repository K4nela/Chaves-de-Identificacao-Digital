<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pergunta</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f2;
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        .topo {
            text-align: center;
            margin-bottom: 20px;
        }

        .titulo {
            font-size: 28px;
            color: #4b6b2c;
        }

        .card {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        .pergunta {
            font-size: 22px;
            margin-bottom: 20px;
        }

        .botoes {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .botao {
            background-color: #6b8e23;
            color: white;
            padding: 15px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            width: 150px;
        }

        .botao:hover {
            background-color: #5a7a1e;
        }

        .voltar {
            margin-top: 20px;
            text-align: center;
        }

        .voltar a {
            text-decoration: none;
            color: #555;
        }

        .progresso-container {
            background-color: #ddd;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progresso {
            height: 10px;
            background: linear-gradient(90deg, #6b8e23, #8fbc8f);
            width: 0%;
            transition: width 0.9s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .progresso::after {
            content: "";
            position: absolute;
            top: 0;
            left: -50%;
            width: 50%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            transform: skewX(-25deg);
            animation: brilho 2s infinite;
        }

        @keyframes brilho {
            0% { left: -50%; }
            100% { left: 120%; }
        }
        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
            opacity: 0;
            transform: translateY(20px);
            animation: aparecer 0.6s ease forwards;
        }

        @keyframes aparecer {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

    </style>
</head>

<body>

<div class="container">

    <div class="topo">
        <h1 class="titulo">Identificação Guiada</h1>
    </div>

    <!-- Barra de progresso -->
    <div class="progresso-container">
        <div class="progresso" id="barra"></div>
    </div>

    <div class="card">
        <h2 class="pergunta">{{ pergunta }}</h2>

        <form action="/responder" method="post">
            <input type="hidden" name="etapa" value="{{ etapa }}">

            <div class="botoes">
                <button type="submit" name="resposta" value="sim" class="botao">
                    ✔ Sim
                </button>

                <button type="submit" name="resposta" value="nao" class="botao">
                    ✖ Não
                </button>
            </div>
        </form>
    </div>

    <div class="voltar">
        <a href="/">← Voltar ao início</a>
    </div>

</div>

<script>
    (function() {
        const barra = document.getElementById("barra");
        const progressoValor = parseInt("{{ progresso }}");

        if (barra) {
            requestAnimationFrame(() => {
                setTimeout(() => {
                    barra.style.width = progressoValor + "%";
                }, 150);
            });
        }
    })();
</script>

</body>
</html>
