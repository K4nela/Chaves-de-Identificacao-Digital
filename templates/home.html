<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Início</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f2;
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
            opacity: 0;
            transform: translateY(20px);
            animation: aparecer 0.6s ease forwards;
        }

        @keyframes aparecer {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .topo {
            text-align: center;
            margin-bottom: 30px;
        }

        .titulo {
            font-size: 32px;
            color: #4b6b2c;
        }

        .card {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .descricao {
            font-size: 18px;
            margin-bottom: 25px;
            color: #555;
        }

        .botao {
            background-color: #6b8e23;
            color: white;
            padding: 15px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
        }

        .botao:hover {
            background-color: #5a7a1e;
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            color: #777;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="topo">
        <h1 class="titulo">🕷️ Identificação de Aracnídeos</h1>
    </div>

    <div class="card">
        <p class="descricao">
            Descubra qual tipo de aranha migalomorfa você encontrou através de uma identificação guiada.
        </p>

        <a href="/quiz">
            <button class="botao">🔍 Começar Identificação</button>
        </a>

        <a href="/filtro">
            <button class="botao">🔎 Buscar por Filtros</button>
        </a>
    </div>

    <div class="footer">
        <p>Projeto acadêmico • Identificação de espécies</p>
    </div>

</div>

</body>
</html>
